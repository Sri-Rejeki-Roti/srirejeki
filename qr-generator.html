<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Absen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fef9ef;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(15,155,142,0.12);
      border: 1px solid #ece4d3;
    }
    .title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 28px;
      color: #0f9b8e;
    }
    .sub {
      color: #8a8071;
      font-size: 14px;
      margin: 4px 0 20px;
    }
    .qr-wrapper {
      display: inline-block;
      padding: 20px;
      background: white;
      border-radius: 16px;
      border: 3px solid #0f9b8e;
      margin-bottom: 16px;
      min-height: 260px;
      min-width: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .info {
      font-size: 13px;
      color: #2b2620;
      line-height: 1.8;
      text-align: left;
      background: #f8f8f8;
      padding: 16px;
      border-radius: 12px;
    }
    .info strong { color: #0f9b8e; }
    .btn-print {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      background: #0f9b8e;
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin: 12px 0;
    }
    .btn-print:hover { background: #0b756c; }
    .cabang-select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ece4d3;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 16px;
      background: white;
    }
    @media print {
      .no-print { display: none !important; }
      .card { border: 1px solid #ddd; box-shadow: none; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">📋 QR Code Absen</div>
  <div class="sub">Tempel di pintu masuk kantor</div>

  <div class="no-print">
    <label style="font-size:12px;font-weight:600;display:block;text-align:left;margin-bottom:4px;">🏢 Pilih Cabang:</label>
    <select class="cabang-select" id="cabang-select" onchange="generateQR()">
      <option value="1">Cabang Utama</option>
    </select>
  </div>

  <div class="qr-wrapper">
    <div id="qrcode"></div>
  </div>

  <div class="info">
    <strong>📌 Cara Pakai:</strong><br>
    1. Scan QR Code pakai kamera HP<br>
    2. Otomatis buka halaman absen<br>
    3. Pilih nama → Klik "Absen"<br>
    4. ✅ Selesai!<br><br>
    <strong>⏰ Jam Operasional:</strong><br>
    <span style="color:#0f9b8e;font-weight:700;">07:00 - 09:00 WIB</span>
  </div>

  <button class="btn-print no-print" onclick="window.print()">🖨️ Cetak QR</button>
  <button class="btn-print no-print" onclick="window.location.href='index.html'" style="background:#ece4d3;color:#2b2620;">⬅ Kembali</button>
</div>

<script>
// ============================================================
// QR CODE GENERATOR (TANPA SUPABASE)
// ============================================================

function generateQR() {
  const cabangId = document.getElementById('cabang-select').value;
  const baseUrl = window.location.origin + '/absen-scan.html';
  const url = baseUrl + '?cabang=' + cabangId;
  
  console.log('📱 Generating QR for URL:', url);
  
  const qrContainer = document.getElementById('qrcode');
  
  // Cek apakah QRCode library tersedia
  if (typeof QRCode === 'undefined') {
    qrContainer.innerHTML = '❌ Library QRCode tidak ditemukan!';
    console.error('QRCode library not loaded!');
    return;
  }
  
  // Bersihkan container
  qrContainer.innerHTML = '';
  
  try {
    // Generate QR
    new QRCode(qrContainer, {
      text: url,
      width: 220,
      height: 220,
      colorDark: '#0f9b8e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    console.log('✅ QR Code generated successfully!');
  } catch (e) {
    console.error('❌ QR Generation error:', e);
    qrContainer.innerHTML = '❌ Gagal generate QR: ' + e.message;
  }
}

// ============================================================
// 2. CEK LIBRARY SAAT LOAD
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  console.log('🔍 Checking QRCode library...');
  console.log('QRCode:', typeof QRCode);
  
  if (typeof QRCode === 'undefined') {
    console.error('❌ QRCode library NOT LOADED!');
    document.getElementById('qrcode').innerHTML = 
      '❌ Library QRCode tidak ditemukan. Cek koneksi internet.';
    return;
  }
  
  console.log('✅ QRCode library loaded!');
  generateQR();
});
</script>
</body>
</html>
