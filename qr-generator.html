<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Absen</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fef9ef;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(15,155,142,0.12);
      border: 1px solid #ece4d3;
    }
    .title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 28px;
      color: #0f9b8e;
    }
    .sub {
      color: #8a8071;
      font-size: 14px;
      margin: 4px 0 20px;
    }
    .qr-wrapper {
      display: inline-block;
      padding: 20px;
      background: white;
      border-radius: 16px;
      border: 3px solid #0f9b8e;
      margin-bottom: 16px;
      min-height: 260px;
      min-width: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-wrapper img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .info {
      font-size: 13px;
      color: #2b2620;
      line-height: 1.8;
      text-align: left;
      background: #f8f8f8;
      padding: 16px;
      border-radius: 12px;
    }
    .info strong { color: #0f9b8e; }
    .btn-print {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      background: #0f9b8e;
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin: 12px 0;
    }
    .btn-print:hover { background: #0b756c; }
    .cabang-select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ece4d3;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 16px;
      background: white;
    }
    .cabang-select:focus {
      outline: none;
      border-color: #0f9b8e;
    }
    .jam-info {
      color: #0f9b8e;
      font-weight: 700;
    }
    .url-display {
      font-size: 11px;
      color: #8a8071;
      word-break: break-all;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 8px;
      margin-top: 8px;
    }
    @media print {
      .no-print { display: none !important; }
      .card { border: 1px solid #ddd; box-shadow: none; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">📋 QR Code Absen</div>
  <div class="sub">Tempel di pintu masuk kantor</div>

  <div class="no-print">
    <label style="font-size:12px;font-weight:600;display:block;text-align:left;margin-bottom:4px;">🏢 Pilih Cabang:</label>
    <select class="cabang-select" id="cabang-select" onchange="updateQR()">
      <option value="1">Cabang Utama</option>
    </select>
  </div>

  <!-- QR CODE -->
  <div class="qr-wrapper">
    <img id="qr-image" 
         src="" 
         alt="QR Code"
         style="max-width:100%;max-height:100%;display:block;">
  </div>

  <!-- Tampilkan URL -->
  <div class="url-display no-print" id="url-display"></div>

  <div class="info">
    <strong>📌 Cara Pakai:</strong><br>
    1. Scan QR Code pakai kamera HP<br>
    2. Otomatis buka halaman absen<br>
    3. Pilih nama → Klik "Absen"<br>
    4. ✅ Selesai!<br><br>
    <strong>⏰ Jam Operasional:</strong><br>
    <span class="jam-info" id="jam-info">07:00 - 09:00 WIB</span>
  </div>

  <button class="btn-print no-print" onclick="window.print()">🖨️ Cetak QR</button>
  <button class="btn-print no-print" onclick="window.location.href='index.html'" style="background:#ece4d3;color:#2b2620;">⬅ Kembali</button>
</div>

<script>
// ============================================================
// KONFIGURASI DOMAIN ANDA
// ============================================================
const DOMAIN = 'https://sri-rejeki-roti.github.io/srirejeki';

// ============================================================
// GENERATE QR
// ============================================================
function updateQR() {
  const cabangId = document.getElementById('cabang-select').value;
  
  // URL lengkap ke absen-scan.html
  const url = DOMAIN + '/absen-scan.html?cabang=' + cabangId;
  
  console.log('📱 URL:', url);
  
  // Tampilkan URL
  document.getElementById('url-display').textContent = '🔗 ' + url;
  
  // Set gambar QR dari API
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' + encodeURIComponent(url) + '&color=0f9b8e&bgcolor=ffffff&margin=20';
  
  const img = document.getElementById('qr-image');
  img.src = qrUrl;
  img.alt = 'QR Code untuk ' + url;
  
  console.log('✅ QR Image set to:', qrUrl);
}

// ============================================================
// JALANKAN SAAT HALAMAN LOAD
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  updateQR();
  console.log('✅ QR Generator ready!');
  console.log('🌐 Domain:', DOMAIN);
});

// Update saat cabang berubah
document.getElementById('cabang-select').addEventListener('change', updateQR);
</script>
</body>
</html>
