<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Absen</title>
  <script src="config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fef9ef;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(15,155,142,0.12);
      border: 1px solid #ece4d3;
    }
    .title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 28px;
      color: #0f9b8e;
    }
    .sub {
      color: #8a8071;
      font-size: 14px;
      margin: 4px 0 20px;
    }
    .qr-wrapper {
      display: inline-block;
      padding: 24px;
      background: white;
      border-radius: 16px;
      border: 3px solid #0f9b8e;
      margin-bottom: 16px;
      min-height: 420px;
      min-width: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-wrapper img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .info {
      font-size: 13px;
      color: #2b2620;
      line-height: 1.8;
      text-align: left;
      background: #f8f8f8;
      padding: 16px;
      border-radius: 12px;
    }
    .info strong { color: #0f9b8e; }
    .btn-print {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      background: #0f9b8e;
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin: 12px 0;
    }
    .btn-print:hover { background: #0b756c; }
    .jam-info {
      color: #0f9b8e;
      font-weight: 700;
    }
    .url-display {
      font-size: 11px;
      color: #8a8071;
      word-break: break-all;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 8px;
      margin-top: 8px;
    }
    @media print {
      .no-print { display: none !important; }
      html, body {
        height: auto;
        padding: 0;
        background: white;
        align-items: flex-start;
      }
      .card {
        max-width: 100%;
        width: 100%;
        border: none;
        box-shadow: none;
        padding: 4vh 4vw;
      }
      .title { font-size: 7vw; }
      .sub { font-size: 3vw; margin-bottom: 4vh; }
      .qr-wrapper {
        min-width: 0;
        min-height: 0;
        width: 70vw;
        height: 70vw;
        max-height: 60vh;
        max-width: 60vh;
        padding: 3vw;
        margin: 0 auto 4vh;
      }
      .info {
        font-size: 2.6vw;
        max-width: 80vw;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">📋 QR Code Absen</div>
  <div class="sub">Tempel di pintu masuk kantor</div>

  <!-- QR CODE -->
  <div class="qr-wrapper">
    <img id="qr-image" 
         src="" 
         alt="QR Code"
         style="max-width:100%;max-height:100%;display:block;">
  </div>

  <!-- Tampilkan URL -->
  <div class="url-display no-print" id="url-display"></div>

  <div class="info">
    <strong>📌 Cara Pakai:</strong><br>
    1. Scan QR Code pakai kamera HP<br>
    2. Otomatis buka halaman absen<br>
    3. Pilih nama → Klik "Absen"<br>
    4. ✅ Selesai!<br><br>
    <strong>⏰ Jam Operasional:</strong><br>
    <span class="jam-info" id="jam-info">07:00 - 09:00 WIB</span>
  </div>

  <button class="btn-print no-print" onclick="window.print()">🖨️ Cetak QR</button>
  <button class="btn-print no-print" onclick="window.location.href='index.html'" style="background:#ece4d3;color:#2b2620;">⬅ Kembali</button>
</div>

<script>
// ============================================================
// KONFIGURASI DOMAIN & CABANG
// ============================================================
const DOMAIN = 'https://sri-rejeki-roti.github.io/srirejeki';

// Ganti angka ini kalau mau cetak QR untuk cabang lain
const CABANG_ID = 1;

// ============================================================
// SUPABASE
// ============================================================
let sb;
try {
  if (typeof supabase === 'undefined') throw new Error('Library Supabase gagal dimuat');
  sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
} catch (e) { console.error('Supabase init error:', e); }

// ============================================================
// GENERATE QR
// ============================================================
function updateQR() {
  // URL lengkap ke absen-scan.html
  const url = DOMAIN + '/absen-scan.html?cabang=' + CABANG_ID;

  console.log('📱 URL:', url);

  // Tampilkan URL
  document.getElementById('url-display').textContent = '🔗 ' + url;

  // Set gambar QR dari API
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(url) + '&color=0f9b8e&bgcolor=ffffff&margin=20';

  const img = document.getElementById('qr-image');
  img.src = qrUrl;
  img.alt = 'QR Code untuk ' + url;

  console.log('✅ QR Image set to:', qrUrl);
}

// ============================================================
// AMBIL JAM OPERASIONAL DARI SUPABASE (sinkron dengan Payroll)
// ============================================================
async function loadJamOperasional() {
  const jamInfoEl = document.getElementById('jam-info');

  if (!sb) {
    console.warn('⚠️ Supabase belum siap, pakai default');
    return;
  }

  try {
    const { data, error } = await sb
      .from('settings')
      .select('value')
      .eq('key', 'jam_operasional')
      .eq('cabang_id', CABANG_ID)
      .maybeSingle();

    if (error) throw error;

    if (data && data.value) {
      let jam;
      try {
        jam = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
      } catch (e) {
        jam = { buka: '07:00', tutup: '09:00' };
      }
      jamInfoEl.textContent = (jam.buka || '07:00') + ' - ' + (jam.tutup || '09:00') + ' WIB';
      console.log('✅ Jam operasional dimuat dari Supabase:', jam);
    } else {
      console.log('ℹ️ Belum ada setting jam operasional untuk cabang ini, pakai default');
    }
  } catch (e) {
    console.error('❌ Gagal memuat jam operasional:', e);
    // Biarkan teks default di HTML kalau gagal fetch
  }
}

// ============================================================
// JALANKAN SAAT HALAMAN LOAD
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  updateQR();
  loadJamOperasional();
  console.log('✅ QR Generator ready!');
  console.log('🌐 Domain:', DOMAIN);
});
</script>
</body>
</html>
